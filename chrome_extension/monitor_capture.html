<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drishi Enterprise — Bridge</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #22c55e;
      --accent: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .bridge-container {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .logo-area { margin-bottom: 30px; }
    .logo-text {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--primary);
      text-transform: uppercase;
    }

    .address-box {
      background: rgba(15, 23, 42, 0.5);
      padding: 30px;
      border-radius: 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .address-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .address-value {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }

    .password-row {
      margin-top: 15px;
      font-size: 14px;
      color: var(--text-dim);
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .password-value {
      color: var(--success);
      font-weight: 600;
      font-family: monospace;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--primary);
      color: #fff;
      margin-bottom: 20px;
    }

    .action-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }

    .link-box {
      text-align: left;
      margin-top: 10px;
    }

    .link-header {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .link-input-group {
      display: flex;
      gap: 8px;
    }

    .link-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 0 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover { background: rgba(255, 255, 255, 0.1); }

    .status-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .preview-container {
      margin-top: 30px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: #000;
      aspect-ratio: 16/9;
      display: none;
    }

    video { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>

<body>
  <div class="bridge-container">
    <div class="status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>

    <div class="logo-area">
      <div class="logo-text">Drishi Bridge</div>
    </div>

    <div class="address-box">
      <div class="address-label">Your Drishi Address</div>
      <div class="address-value" id="drishi-address-display">...</div>
      <div class="password-row">
        Password: <span class="password-value" id="password-display">12</span>
      </div>
    </div>

    <button class="action-btn" id="manual-picker-btn">Start Screen Share</button>

    <div class="link-box" id="share-url-container" style="display: none;">
      <div class="link-header">
        Viewer Access Link (Laptop 2)
      </div>
      <div class="link-input-group">
        <input type="text" class="link-input" id="viewer-url-display" readonly />
        <button class="copy-btn" id="copy-url-btn">Copy</button>
      </div>
    </div>

    <div class="preview-container" id="preview-container">
      <video id="capture-video" autoplay muted playsinline></video>
    </div>
  </div>

  <script src="mon_rtc_config.js"></script>
  <script src="monitor_webrtc_sender.js"></script>
  <script src="monitor_capture.js"></script>
</body>

</html>
