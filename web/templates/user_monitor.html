<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{{ product_name }} — Live Answers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0D1210;
      --surface: #151A14;
      --border:  #222E21;
      --text:    #E8F0E6;
      --muted:   #8BA888;
      --dim:     #4E6B4C;
      --green:   #22C55E;
      --amber:   #F59E0B;
      --red:     #EF4444;
      --blue:    #60A5FA;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-area {
      display: flex; align-items: center; gap: 7px; flex: 1;
    }
    .logo-text {
      font-size: 13px; font-weight: 800; letter-spacing: 0.5px; color: #FFFFFF;
    }

    .user-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
      padding: 3px 9px; border-radius: 6px;
      background: rgba(34,197,94,0.12);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.3);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.off {
      background: var(--red);
      box-shadow: 0 0 6px rgba(239,68,68,0.5);
      animation: none;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Status bar ── */
    .status-bar {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      text-align: center;
      letter-spacing: 0.3px;
    }
    .status-bar.live { color: var(--green); }
    .status-bar.offline { color: var(--red); }

    /* ── Feed ── */
    .feed {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Answer cards ── */
    .qa-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .qa-card.latest { border-color: rgba(34,197,94,0.3); }
    .qa-card.generating { border-color: rgba(245,158,11,0.3); }

    /* ── Card top row ── */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .src-badge {
      font-size: 9px; padding: 3px 7px; border-radius: 5px;
      font-weight: 800; letter-spacing: 0.4px; flex-shrink: 0; margin-top: 2px;
    }
    .badge-db  { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .badge-llm { background: rgba(96,165,250,0.12); color: var(--blue);  border: 1px solid rgba(96,165,250,0.25); }
    .badge-gen { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }

    .q-text {
      font-size: 12px; color: var(--muted); font-weight: 600;
      flex: 1; line-height: 1.5;
    }

    .copy-btn {
      flex-shrink: 0; background: none;
      border: 1px solid var(--border); color: var(--dim);
      border-radius: 5px; padding: 3px 9px;
      font-size: 10px; cursor: pointer; transition: all .15s;
      font-weight: 700; font-family: 'Inter', sans-serif;
    }
    .copy-btn:hover  { border-color: var(--green); color: var(--green); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── Answer body ── */
    .ans-text {
      font-size: 13px; color: #B8D4B4;
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    }
    .ans-bullets {
      list-style: none;
      display: flex; flex-direction: column; gap: 6px;
    }
    .ans-bullets li {
      padding: 7px 10px; border-radius: 7px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-size: 12px; color: #B8D4B4;
      line-height: 1.6;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .ans-bullets li::before {
      content:''; width:5px; height:5px; border-radius:50%;
      background: var(--green); flex-shrink:0; margin-top:6px;
    }

    pre.ans-code {
      background: #0A0F09;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: #86EFAC;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
    }

    /* ── Thinking spinner ── */
    .thinking {
      color: var(--amber);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--amber); opacity: 0.3;
      animation: think 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    .empty-icon { font-size: 40px; display: block; margin-bottom: 14px; }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .empty-sub { font-size: 12px; line-height: 1.7; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo-area">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#22C55E"/>
      <text x="14" y="20" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="white">D</text>
    </svg>
    <span class="logo-text">{{ product_name }}</span>
  </div>
  <span class="user-badge" id="userBadge">{{ user_token }}</span>
  <div class="dot" id="dot"></div>
</div>

<!-- Status bar -->
<div class="status-bar" id="statusBar">Connecting…</div>

<!-- Feed -->
<div class="feed" id="feed">
  <div class="empty">
    <span class="empty-icon">📡</span>
    <div class="empty-title">Waiting for questions…</div>
    <div class="empty-sub">Answers will appear here in real time<br>as your interview progresses.</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const USER_TOKEN = {{ user_token | tojson }};
  const POLL_MS    = 2500;
  let   _lastHash  = '';
  let   _answers   = [];

  async function fetchAnswers() {
    try {
      const r = await fetch(`/api/answers?user_token=${encodeURIComponent(USER_TOKEN)}`, {
        headers: { 'ngrok-skip-browser-warning': 'true' },
      });
      if (!r.ok) throw new Error('server ' + r.status);
      const data = await r.json();
      setOnline(true);
      const hash = JSON.stringify((data || []).slice(0, 6).map(a => a.answer?.slice(-40) + a.is_complete));
      if (hash !== _lastHash) { _lastHash = hash; _answers = data || []; render(); }
    } catch (_) {
      setOnline(false);
    }
  }

  function setOnline(ok) {
    const dot = document.getElementById('dot');
    const bar = document.getElementById('statusBar');
    dot.className = 'dot' + (ok ? '' : ' off');
    if (ok) {
      bar.textContent = `Live — ${_answers.length} Q&A answer${_answers.length !== 1 ? 's' : ''}`;
      bar.className = 'status-bar live';
    } else {
      bar.textContent = 'Offline — retrying…';
      bar.className = 'status-bar offline';
    }
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatAnswer(text) {
    if (!text) return '';
    const codeMatch = text.match(/```[\w]*\n?([\s\S]*?)```/);
    if (codeMatch) {
      const pre  = text.slice(0, codeMatch.index).trim();
      const code = codeMatch[1].trim();
      const post = text.slice(codeMatch.index + codeMatch[0].length).trim();
      return (pre  ? formatAnswer(pre)  : '') +
             `<pre class="ans-code">${esc(code)}</pre>` +
             (post ? formatAnswer(post) : '');
    }
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const bullets = lines.filter(l => /^[-•*]\s/.test(l));
    if (bullets.length >= 2 && bullets.length >= lines.length * 0.55) {
      const items = lines.map(l => `<li>${esc(l.replace(/^[-•*]\s+/,''))}</li>`).join('');
      return `<ul class="ans-bullets">${items}</ul>`;
    }
    return `<div class="ans-text">${esc(text)}</div>`;
  }

  function render() {
    const feed = document.getElementById('feed');
    if (!_answers || _answers.length === 0) {
      feed.innerHTML = `<div class="empty">
        <span class="empty-icon">📡</span>
        <div class="empty-title">Waiting for questions…</div>
        <div class="empty-sub">Answers will appear here in real time<br>as your interview progresses.</div>
      </div>`;
      return;
    }

    feed.innerHTML = _answers.slice(0, 20).map((item, idx) => {
      const src = (item.metrics && item.metrics.source) || '';
      const isDb  = src.startsWith('db-');
      const isGen = !item.is_complete;
      const badgeClass = isDb ? 'badge-db' : (isGen ? 'badge-gen' : 'badge-llm');
      const badgeText  = isDb ? 'DB'       : (isGen ? 'GEN'      : 'AI');

      const qText  = (item.question || '').trim();
      const aText  = (item.answer   || '').trim();
      const ansHtml = !item.is_complete
        ? (aText
            ? `<div class="ans-text">${esc(aText)}</div>`
            : `<div class="thinking">Generating<div class="thinking-dots"><span></span><span></span><span></span></div></div>`)
        : formatAnswer(aText);

      const cardCls = 'qa-card'
        + (idx === 0 && item.is_complete ? ' latest' : '')
        + (!item.is_complete ? ' generating' : '');

      return `
        <div class="${cardCls}">
          <div class="card-top">
            <span class="src-badge ${badgeClass}">${badgeText}</span>
            <span class="q-text">${esc(qText)}</span>
            ${item.is_complete ? `<button class="copy-btn" onclick="copyAns(this,${JSON.stringify(aText)})">Copy</button>` : ''}
          </div>
          <div>${ansHtml}</div>
        </div>`;
    }).join('');
  }

  window.copyAns = async function(btn, text) {
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    } catch (_) {}
  };

  fetchAnswers();
  setInterval(fetchAnswers, POLL_MS);
})();
</script>
</body>
</html>
